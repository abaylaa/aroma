<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f4e79">
<title>Login — Aroma Lab</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1f4e79 0%, #2e75b6 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex; align-items: center;
    padding: 24px 12px;
  }
  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: clamp(24px, 5vw, 40px);
    box-shadow: 0 24px 60px rgba(0,0,0,.25);
    max-width: 420px;
    width: 100%;
  }
  .brand { font-weight: 800; font-size: clamp(22px, 4.5vw, 28px); color: #1f4e79; text-align: center; }
  .brand span { color: #ffd54f; }
  .btn-login { background: #1f4e79; color: #fff; font-weight: 700; padding: 12px; border: 0; min-height: 48px; }
  .btn-login:hover { background: #163a5c; color: #fff; }
  .form-control:focus { border-color: #2e75b6; box-shadow: 0 0 0 .2rem rgba(46,117,182,.15); }
  .form-control-lg { min-height: 48px; }
  @media (max-width: 360px) {
    .login-card { border-radius: 16px; }
  }
</style>
</head>
<body>
<div class="container px-0">
  <div class="mx-auto login-card">
    <div class="brand mb-1">Aroma <span>Lab</span></div>
    <p class="text-center text-muted mb-4">Admin Console Login</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control form-control-lg" required autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-login w-100 btn-lg">Sign in</button>
    </form>

    <div class="text-center mt-4">
      <small class="text-muted">Demo: <code>admin</code> / <code>1234</code></small>
    </div>
    <div class="text-center mt-3">
      <a href="{{ url_for('landing') }}" class="text-decoration-none small">← Back to home</a>
    </div>
  </div>
</div>
</body>
</html>
